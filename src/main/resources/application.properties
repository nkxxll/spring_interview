spring.application.name=server
spring.datasource.url=jdbc:h2:file:./data/server-db
spring.web.resources.static-locations=classpath:/static/
# Basic connection
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate behavior (crucial for files)
# "update" keeps your data; "create-drop" deletes it every time you stop Jetty!
spring.jpa.hibernate.ddl-auto=update

# Enable the Web Console so you can see the file data in your browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Required so the console can open file-based databases via JDBC URL
spring.h2.console.settings.trace=false
