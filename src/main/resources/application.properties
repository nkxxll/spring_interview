spring.application.name=server
spring.datasource.url=jdbc:h2:file:./data/server-db
spring.web.resources.static-locations=classpath:/static/
# Basic connection
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate behavior (crucial for files)
# "update" keeps your data; "create-drop" deletes it every time you stop Jetty!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Enable the Web Console so you can see the file data in your browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Required so the console can open file-based databases via JDBC URL
spring.h2.console.settings.trace=false
# The primary name for your service in the dashboard
spring.application.name=interview-server

# --- Tracing (OTLP via gRPC on port 4317) ---
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://griffin:4317
management.otlp.tracing.compression=gzip
management.otlp.tracing.transport=grpc

# --- Metrics (OTLP via HTTP on port 4318) ---
management.otlp.metrics.export.url=http://griffin:4318/v1/metrics
management.otlp.metrics.export.step=30s

# --- Logging (OTLP via HTTP on port 4318) ---
management.otlp.logging.endpoint=http://griffin:4318/v1/logs
management.otlp.logging.compression=gzip

# Resource attributes
management.opentelemetry.resource-attributes.deployment.environment=production
management.opentelemetry.resource-attributes.service.version=1.0.0


# Basic Connection
spring.cassandra.contact-points=griffin:7000
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=interview_server

# Schema Management (Use 'none' for production)
spring.cassandra.schema-action=create_if_not_exists

# Authentication (disabled - Cassandra container has no auth)
# spring.cassandra.username=cassandra
# spring.cassandra.password=cassandra

# Request Timeouts
spring.cassandra.request.timeout=10s
