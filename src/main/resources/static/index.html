<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Blog
  </a>
  <div class="nav-actions">
    <a href="aoc.html" class="btn btn-outline">Advent of Code</a>
    <a href="create-post.html" class="btn btn-primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Post
    </a>
  </div>
</nav>

<div class="hero">
  <h1>Welcome to <span>Blog</span></h1>
  <p>Share ideas, discover posts, and join the conversation.</p>
  <a href="create-post.html" class="btn btn-primary">Write a Post →</a>
</div>

<div class="container-wide">
  <div class="section-header">
    <div class="section-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      All Posts
      <span class="count-badge" id="post-count" style="display:none"></span>
    </div>
    <div class="search-box">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" class="search-input" placeholder="Search posts…" autocomplete="off" />
      <div class="search-spinner spinner" id="search-spinner" style="display:none"></div>
    </div>
  </div>

  <div class="posts-grid" id="posts-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading posts…
    </div>
  </div>
</div>

<script>
  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderPosts(posts, query) {
    const grid = document.getElementById('posts-grid');
    const countBadge = document.getElementById('post-count');

    countBadge.textContent = posts.length;
    countBadge.style.display = '';

    if (posts.length === 0) {
      grid.innerHTML = query
        ? `<div class="empty-state">
             <div class="empty-state-icon">🔍</div>
             <h3>No results for "${escHtml(query)}"</h3>
             <p>Try a different search term.</p>
           </div>`
        : `<div class="empty-state">
             <div class="empty-state-icon">📝</div>
             <h3>No posts yet</h3>
             <p>Be the first to share something!</p>
             <a href="create-post.html" class="btn btn-primary">Write a Post</a>
           </div>`;
      return;
    }

    grid.innerHTML = posts.map(post => {
      const excerpt = (post.content || '').slice(0, 180) + (post.content && post.content.length > 180 ? '…' : '');
      const commentCount = (post.comments || []).length;
      const relatedCount = (post.relatedPosts || []).length;
      return `
        <div class="post-card" onclick="location.href='post.html?id=${post.id}'">
          <div class="post-card-title">${escHtml(post.title || 'Untitled')}</div>
          <div class="post-card-excerpt">${escHtml(excerpt) || '<em style="opacity:.5">No content</em>'}</div>
          <div class="post-card-meta">
            <span class="meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${commentCount} comment${commentCount !== 1 ? 's' : ''}
            </span>
            ${relatedCount > 0 ? `
            <span class="meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              ${relatedCount} linked
            </span>` : ''}
            <span class="meta-item" style="margin-left:auto">Read →</span>
          </div>
        </div>`;
    }).join('');
  }

  async function fetchAndRender(query) {
    const grid = document.getElementById('posts-grid');
    const spinner = document.getElementById('search-spinner');
    spinner.style.display = '';

    try {
      const url = query ? `/api/post/search?q=${encodeURIComponent(query)}` : '/api/post/show';
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const posts = await res.json();
      renderPosts(posts, query);
    } catch (err) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Could not load posts</h3><p>${escHtml(err.message)}</p></div>`;
    } finally {
      spinner.style.display = 'none';
    }
  }

  // Initial load
  fetchAndRender('');

  // Debounced search
  let debounceTimer;
  document.getElementById('search-input').addEventListener('input', (e) => {
    const query = e.target.value.trim();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fetchAndRender(query), 500);
  });
</script>
</body>
</html>
