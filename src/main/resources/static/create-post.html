<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Post · Blog</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Blog
  </a>
  <div class="nav-actions">
    <a href="aoc.html" class="btn btn-outline btn-sm">Advent of Code</a>
    <a href="index.html" class="btn btn-ghost">← Back</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    New Post
  </div>

  <div class="form-card">
    <div class="form-card-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Create a Post
    </div>

    <div id="alert-area"></div>

    <form id="post-form">
      <div class="form-group">
        <label class="form-label" for="title">Title</label>
        <input class="form-input" id="title" type="text" placeholder="Give your post a title…" required autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label" for="content">Content</label>
        <textarea class="form-textarea" id="content" placeholder="Write your post content here…" style="min-height:200px" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Link Related Posts</label>
        <div class="form-hint" style="margin-bottom:.5rem">Select posts to link as related content. Optional.</div>
        <div class="related-picker" id="related-picker">
          <div class="picker-empty" style="padding:1.25rem">
            <div class="spinner" style="margin:0 auto .5rem"></div>
            Loading posts…
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Publish Post
        </button>
        <a href="index.html" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  let allPosts = [];

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showAlert(msg, type = 'error') {
    document.getElementById('alert-area').innerHTML =
      `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
  }

  async function loadRelatedPicker() {
    const picker = document.getElementById('related-picker');
    try {
      const res = await fetch('/api/post/show');
      if (!res.ok) throw new Error('Failed to load posts');
      allPosts = await res.json();

      if (allPosts.length === 0) {
        picker.innerHTML = '<div class="picker-empty">No existing posts to link yet.</div>';
        return;
      }

      picker.innerHTML = allPosts.map(p => `
        <label class="related-picker-item" id="pick-${p.id}">
          <input type="checkbox" value="${p.id}" onchange="updatePickerStyle(${p.id}, this.checked)" />
          <span>${escHtml(p.title || 'Untitled')}</span>
        </label>`).join('');
    } catch (err) {
      picker.innerHTML = `<div class="picker-empty">Could not load posts: ${escHtml(err.message)}</div>`;
    }
  }

  function updatePickerStyle(id, checked) {
    document.getElementById(`pick-${id}`).classList.toggle('checked', checked);
  }

  function getSelectedIds() {
    return [...document.querySelectorAll('#related-picker input[type=checkbox]:checked')]
      .map(cb => ({ id: parseInt(cb.value) }));
  }

  document.getElementById('post-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Publishing…';
    document.getElementById('alert-area').innerHTML = '';

    const body = {
      title: document.getElementById('title').value.trim(),
      content: document.getElementById('content').value.trim(),
      relatedPosts: getSelectedIds(),
    };

    try {
      const res = await fetch('/api/post/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const created = await res.json();
      location.href = `post.html?id=${created.id}`;
    } catch (err) {
      showAlert('Failed to create post: ' + err.message);
      btn.disabled = false;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Publish Post`;
    }
  });

  loadRelatedPicker();
</script>
</body>
</html>
